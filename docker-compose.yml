# docker-compose.yml
# Orchestration complète de l'application en 3 services :
#   - frontend : React (Vite) — port 3000
#   - backend  : FastAPI — port 8000
#   - db       : PostgreSQL — port 5432 (optionnel, SQLite par défaut)
#
# Lancement complet (depuis le dossier student-app/) :
#   docker compose up --build
#
# Lancement en mode développement (sans Docker, plus simple) :
#   cd backend  && uvicorn main:app --reload --port 8000
#   cd frontend && npm run dev

version: "3.9"

services:

  # ── Backend FastAPI ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      # Monte le modèle .pkl depuis le répertoire local dans le conteneur
      # Régénérez le .pkl dans le notebook et il sera automatiquement disponible
      - ./backend/model_student_performance.pkl:/app/model_student_performance.pkl:ro
      # Volume persistant pour la base SQLite
      - backend_data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:///./data/predictions.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Frontend React ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    environment:
      # URL de l'API backend vue depuis le navigateur de l'utilisateur
      - VITE_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_data:
    driver: local

---
